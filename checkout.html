<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>结算 - 乐购商城</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cart.css">
    <style>
        /* 结算页面额外样式 */
        .checkout-section {
            padding: 30px 0;
        }
        
        .checkout-content {
            display: flex;
            gap: 30px;
        }
        
        .checkout-left {
            flex: 1;
        }
        
        .checkout-right {
            width: 350px;
        }
        
        .checkout-box {
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .checkout-box h3 {
            font-size: 16px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        
        /* 收货地址 */
        .address-list {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .address-item {
            width: calc(50% - 7.5px);
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        
        .address-item:hover,
        .address-item.selected {
            border-color: #ff6700;
        }
        
        .address-item.selected::before {
            content: '';
            display: block;
            width: 20px;
            height: 20px;
            background: #ff6700;
            border-radius: 50%;
            position: relative;
            float: right;
        }
        
        .address-item.selected::after {
            content: '✓';
            color: #fff;
            position: relative;
            right: 18px;
            top: 2px;
            font-size: 12px;
        }
        
        .address-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .address-phone {
            margin-bottom: 5px;
            color: #666;
        }
        
        .address-detail {
            color: #999;
            font-size: 14px;
        }
        
        .add-address-btn {
            width: calc(50% - 7.5px);
            padding: 30px;
            border: 2px dashed #ddd;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .add-address-btn:hover {
            border-color: #ff6700;
            color: #ff6700;
        }
        
        /* 商品清单 */
        .product-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .product-item {
            display: flex;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }
        
        .product-item:last-child {
            border-bottom: none;
        }
        
        .product-item-image {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            overflow: hidden;
            margin-right: 15px;
        }
        
        .product-item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .product-item-info {
            flex: 1;
        }
        
        .product-item-name {
            font-size: 14px;
            margin-bottom: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .product-item-price {
            color: #ff6700;
            font-weight: bold;
        }
        
        .product-item-quantity {
            color: #999;
            font-size: 14px;
            margin-top: 5px;
        }
        
        /* 优惠券 */
        .coupon-list {
            max-height: 200px;
            overflow-y: auto;
        }
        
        .coupon-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .coupon-item:hover,
        .coupon-item.selected {
            border-color: #ff6700;
        }
        
        .coupon-item input {
            margin-right: 15px;
        }
        
        .coupon-value {
            font-size: 24px;
            color: #ff6700;
            font-weight: bold;
            margin-right: 10px;
        }
        
        .coupon-condition {
            font-size: 12px;
            color: #999;
        }
        
        /* 支付方式 */
        .payment-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .payment-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .payment-item:hover,
        .payment-item.selected {
            border-color: #ff6700;
        }
        
        .payment-item input {
            margin-right: 15px;
        }
        
        .payment-icon {
            width: 40px;
            height: 40px;
            background: #f5f5f5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 20px;
        }
        
        /* 订单摘要 */
        .order-summary {
            position: sticky;
            top: 100px;
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 14px;
        }
        
        .summary-row.total {
            font-size: 18px;
            font-weight: bold;
            color: #ff6700;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: #ff6700;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }
        
        .submit-btn:hover {
            background: #ff5700;
        }
        
        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        /* 地址弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .modal-content {
            background: #fff;
            border-radius: 10px;
            padding: 30px;
            width: 400px;
        }
        
        .modal-content h3 {
            margin-bottom: 20px;
        }
        
        .modal-content .form-group {
            margin-bottom: 15px;
        }
        
        .modal-content input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        .modal-content textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            height: 80px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .modal-btn.cancel {
            background: #f5f5f5;
        }
        
        .modal-btn.confirm {
            background: #ff6700;
            color: #fff;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .checkout-content {
                flex-direction: column;
            }
            
            .checkout-right {
                width: 100%;
            }
            
            .address-item,
            .add-address-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-top">
            <div class="container">
                <div class="header-left">
                    <span>欢迎来到乐购商城</span>
                </div>
                <div class="header-right">
                    <a href="login.html" id="login-link">登录</a>
                    <span>|</span>
                    <a href="register.html">注册</a>
                    <span>|</span>
                    <a href="profile.html">个人中心</a>
                    <span>|</span>
                    <a href="cart.html" id="cart-link">购物车(<span id="cart-count">0</span>)</a>
                </div>
            </div>
        </div>
        
        <!-- Logo和搜索框 -->
        <div class="header-main">
            <div class="container">
                <div class="logo">
                    <a href="index.html"><img src="images/LOGO.PNG" alt="乐购商城"></a>
                </div>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="搜索商品...">
                    <button id="search-btn">搜索</button>
                </div>
            </div>
        </div>
    </header>

    <!-- 结算页面内容 -->
    <section class="checkout-section">
        <div class="container">
            <h2>确认订单</h2>
            
            <div class="checkout-content">
                <div class="checkout-left">
                    <!-- 收货地址 -->
                    <div class="checkout-box">
                        <h3>收货地址</h3>
                        <div class="address-list" id="address-list">
                            <!-- 地址将通过JS动态加载 -->
                        </div>
                        <div class="add-address-btn" onclick="showAddressModal()">+ 添加新地址</div>
                    </div>
                    
                    <!-- 商品清单 -->
                    <div class="checkout-box">
                        <h3>商品清单</h3>
                        <div class="product-list" id="product-list">
                            <!-- 商品将通过JS动态加载 -->
                        </div>
                    </div>
                    
                    <!-- 优惠券 -->
                    <div class="checkout-box">
                        <h3>优惠券</h3>
                        <div class="coupon-list" id="coupon-list">
                            <label class="coupon-item">
                                <input type="radio" name="coupon" value="none" checked>
                                <span class="coupon-value">¥0</span>
                                <span>不使用优惠券</span>
                            </label>
                            <label class="coupon-item">
                                <input type="radio" name="coupon" value="10">
                                <span class="coupon-value">¥10</span>
                                <span>满100减10 <span class="coupon-condition">满100可用</span></span>
                            </label>
                            <label class="coupon-item">
                                <input type="radio" name="coupon" value="20">
                                <span class="coupon-value">¥20</span>
                                <span>满200减20 <span class="coupon-condition">满200可用</span></span>
                            </label>
                        </div>
                    </div>
                    
                    <!-- 支付方式 -->
                    <div class="checkout-box">
                        <h3>支付方式</h3>
                        <div class="payment-list">
                            <label class="payment-item selected">
                                <input type="radio" name="payment" value="alipay" checked>
                                <div class="payment-icon">支付宝</div>
                                <span>支付宝</span>
                            </label>
                            <label class="payment-item">
                                <input type="radio" name="payment" value="wechat">
                                <div class="payment-icon">微信</div>
                                <span>微信支付</span>
                            </label>
                            <label class="payment-item">
                                <input type="radio" name="payment" value="card">
                                <div class="payment-icon">银行卡</div>
                                <span>银行卡支付</span>
                            </label>
                        </div>
                    </div>
                </div>
                
                <!-- 订单摘要 -->
                <div class="checkout-right">
                    <div class="checkout-box order-summary">
                        <h3>订单摘要</h3>
                        <div class="summary-row">
                            <span>商品金额</span>
                            <span id="subtotal">¥0.00</span>
                        </div>
                        <div class="summary-row">
                            <span>运费</span>
                            <span id="shipping">¥0.00</span>
                        </div>
                        <div class="summary-row">
                            <span>优惠</span>
                            <span id="discount">-¥0.00</span>
                        </div>
                        <div class="summary-row total">
                            <span>应付金额</span>
                            <span id="total">¥0.00</span>
                        </div>
                        <button class="submit-btn" id="submit-btn" onclick="submitOrder()">提交订单</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 地址弹窗 -->
    <div class="modal-overlay" id="address-modal">
        <div class="modal-content">
            <h3>添加收货地址</h3>
            <form id="address-form">
                <div class="form-group">
                    <input type="text" id="address-name" placeholder="收货人姓名">
                </div>
                <div class="form-group">
                    <input type="tel" id="address-phone" placeholder="联系电话">
                </div>
                <div class="form-group">
                    <input type="text" id="address-province" placeholder="省/市">
                </div>
                <div class="form-group">
                    <textarea id="address-detail" placeholder="详细地址"></textarea>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="modal-btn cancel" onclick="hideAddressModal()">取消</button>
                    <button type="submit" class="modal-btn confirm">确认添加</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-info">
                <p>学号：27199 | 姓名：学生</p>
                <p>© 2026 乐购商城 版权所有</p>
            </div>
        </div>
    </footer>

    <script src="js/checkout.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
