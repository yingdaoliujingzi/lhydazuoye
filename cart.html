<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物车 - 乐购商城</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cart.css">
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-top">
            <div class="container">
                <div class="header-left">
                    <span>欢迎来到乐购商城</span>
                </div>
                <div class="header-right">
                    <a href="login.html" id="login-link">登录</a>
                    <span>|</span>
                    <a href="register.html">注册</a>
                    <span>|</span>
                    <a href="profile.html">个人中心</a>
                    <span>|</span>
                    <a href="cart.html" id="cart-link">购物车(<span id="cart-count">0</span>)</a>
                </div>
            </div>
        </div>
        
        <!-- Logo和搜索框 -->
        <div class="header-main">
            <div class="container">
                <div class="logo">
                    <a href="index.html"><img src="images/LOGO.PNG" alt="乐购商城"></a>
                </div>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="搜索商品...">
                    <button id="search-btn">搜索</button>
                </div>
            </div>
        </div>
    </header>

    <!-- 购物车内容 -->
    <section class="cart-section">
        <div class="container">
            <h2>购物车</h2>
            
            <!-- 空购物车 -->
            <div class="empty-cart" id="empty-cart" style="display:none;">
                <img src="images/cart.png" alt="空购物车">
                <p>购物车是空的</p>
                <a href="index.html" class="btn-primary">去购物</a>
            </div>
            
            <!-- 购物车列表 -->
            <div class="cart-content" id="cart-content">
                <!-- 购物车列表将通过JS动态加载 -->
            </div>
            
            <!-- 结算区域 -->
            <div class="cart-footer" id="cart-footer">
                <div class="select-all">
                    <label class="checkbox-label">
                        <input type="checkbox" id="select-all">
                        <span class="checkmark"></span>
                        全选
                    </label>
                    <span class="selected-count">已选 <span id="selected-num">0</span> 件商品</span>
                </div>
                
                <div class="total-section">
                    <div class="total-label">合计：</div>
                    <div class="total-price">¥<span id="total-price">0.00</span></div>
                    <button class="checkout-btn" id="checkout-btn" onclick="goToCheckout()">结算</button>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-info">
                <p>学号：27199 | 姓名：学生</p>
                <p>© 2026 乐购商城 版权所有</p>
            </div>
        </div>
    </footer>

    <script src="js/cart.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
