<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 乐购商城</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-main">
            <div class="container">
                <div class="logo">
                    <a href="index.html"><img src="images/LOGO.PNG" alt="乐购商城"></a>
                </div>
            </div>
        </div>
    </header>

    <!-- 注册表单 -->
    <section class="login-section">
        <div class="container">
            <div class="login-box">
                <h2>用户注册</h2>
                
                <form id="register-form">
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <input type="text" id="username" name="username" placeholder="请输入用户名（3-20个字符）">
                        <span class="error" id="username-error"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">邮箱</label>
                        <input type="email" id="email" name="email" placeholder="请输入邮箱地址">
                        <span class="error" id="email-error"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="phone">手机号</label>
                        <input type="tel" id="phone" name="phone" placeholder="请输入手机号">
                        <span class="error" id="phone-error"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" name="password" placeholder="请输入密码（至少6位）">
                        <span class="error" id="password-error"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm-password">确认密码</label>
                        <input type="password" id="confirm-password" name="confirm-password" placeholder="请再次输入密码">
                        <span class="error" id="confirm-error"></span>
                    </div>
                    
                    <div class="form-group checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="agree" name="agree">
                            <span class="checkmark"></span>
                            我已阅读并同意<a href="#">《用户协议》</a>和<a href="#">《隐私政策》</a>
                        </label>
                    </div>
                    
                    <button type="submit" class="login-btn">注册</button>
                    
                    <div class="register-link">
                        已有账号? <a href="login.html">立即登录</a>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-info">
                <p>学号：27199 | 姓名：学生</p>
                <p>© 2026 乐购商城 版权所有</p>
            </div>
        </div>
    </footer>

    <script src="js/register.js"></script>
</body>
</html>
